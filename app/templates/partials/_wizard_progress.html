{% set current = event.current_step if event is defined and event else 1 %}
<div class="wizard-progress mb-4">
    {% set steps = [
        (1, 'Event Details'),
        (2, 'AI Planning'),
        (3, 'Review & Refine'),
        (4, 'Action Items')
    ] %}
    {% for num, label in steps %}
    <div class="wizard-step {{ 'completed' if num < current else ('active' if num == current else '') }}">
        <span class="wizard-step-number">
            {% if num < current %}
            <i class="bi bi-check"></i>
            {% else %}
            {{ num }}
            {% endif %}
        </span>
        <span class="d-none d-md-inline">{{ label }}</span>
    </div>
    {% endfor %}
</div>
